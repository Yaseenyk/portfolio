name: AI Blogger

# Autonomous blog pipeline: Gemini writes a post from scripts/topics.txt and
# commits the resulting .mdx back to main. Runs Mondays & Wednesdays 10:00 UTC.
on:
  schedule:
    - cron: "0 10 * * 1,3"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Needed so the workflow can push the generated post back to the repo.
permissions:
  contents: write

concurrency:
  group: ai-blogger
  cancel-in-progress: false

jobs:
  write-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/ai_writer.py

      - name: Commit & push new post
        run: |
          git config user.name "ai-blogger[bot]"
          git config user.email "ai-blogger[bot]@users.noreply.github.com"
          git add src/content/blog scripts/topics.txt
          if git diff --cached --quiet; then
            echo "No new content generated — nothing to commit."
            exit 0
          fi
          git commit -m "content(blog): autonomous post via Gemini"
          git push
