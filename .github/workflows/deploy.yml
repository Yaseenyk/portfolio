name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Auto-publish after the autonomous blogger commits a post. Its push uses
  # GITHUB_TOKEN, which does not trigger `on: push`, so chain off its run instead.
  workflow_run:
    workflows: ["AI Blogger"]
    types: [completed]
  workflow_dispatch: # allow manual runs from the Actions tab

# Required for the GitHub Pages deployment to authenticate via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-progress deploy at a time; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # On the workflow_run trigger only deploy if AI Blogger succeeded; push and
    # manual runs are unaffected.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # auto-enable Pages (Actions source) — no manual toggle

      - name: Install dependencies
        run: npm ci
        env:
          # puppeteer is local-tooling only (resume PDF) — don't download
          # Chromium on every deploy.
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Build (static export)
        run: npm run build
        env:
          # Custom domain → served at root, so no basePath. Used for
          # canonical/OG/JSON-LD/sitemap URLs.
          NEXT_PUBLIC_SITE_URL: https://yaseenkhatib.streamerosai.com

      - name: Disable Jekyll
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # AEO: tell Bing (whose index feeds ChatGPT search) about new/changed posts
  # the moment they deploy, instead of waiting for a re-crawl. The key is not
  # a secret — it is published at /​<key>.txt by design of the protocol.
  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      SITE: https://yaseenkhatib.streamerosai.com
      KEY: e8cf5c826c584768e21217b4ecbaaf79
    steps:
      - name: Checkout (with parent commit for the diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Submit changed URLs to IndexNow
        run: |
          urls=("$SITE/" "$SITE/blog/")
          for f in $(git diff --name-only HEAD^ HEAD -- src/content 2>/dev/null); do
            [ -f "$f" ] || continue
            slug=$(grep -oP 'slug:\s*"?\K[^",]+' "$f" | head -1)
            [ -z "$slug" ] && slug=$(basename "${f%.*}")
            urls+=("$SITE/blog/$slug/")
          done
          printf 'submitting %s urls:\n' "${#urls[@]}"; printf '  %s\n' "${urls[@]}"
          json=$(printf '"%s",' "${urls[@]}"); json="[${json%,}]"
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"yaseenkhatib.streamerosai.com\",\"key\":\"$KEY\",\"keyLocation\":\"$SITE/$KEY.txt\",\"urlList\":$json}" \
            -w "\nHTTP %{http_code}\n" || true
