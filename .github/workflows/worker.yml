name: Concierge Worker

# Two jobs, one worker:
#   deploy  — pushes worker/** changes to Cloudflare (wrangler).
#   reindex — after every Pages deploy, re-embeds the live llms-full.txt
#             corpus into Vectorize so the concierge knows the newest posts.
# Both no-op gracefully until CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID
# repo secrets are configured.
on:
  push:
    branches: [main]
    paths: ["worker/**", ".github/workflows/worker.yml"]
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Deploy worker
        working-directory: worker
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not configured yet — skipping deploy."
            exit 0
          fi
          npx wrangler@4 deploy

  reindex:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Re-embed the live corpus into Vectorize
        run: node worker/scripts/index-corpus.mjs
