name: Concierge Worker

# Two jobs, one worker:
#   deploy  — pushes worker/** changes to Cloudflare (wrangler).
#   reindex — re-embeds the live llms-full.txt corpus into Vectorize. Runs
#             once daily (not after every Pages deploy) to stay under the
#             Workers-AI free-tier neuron cap; trigger manually for an
#             immediate refresh after big content changes.
# Both no-op gracefully until CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID
# repo secrets are configured.
on:
  push:
    branches: [main]
    paths: ["worker/**", ".github/workflows/worker.yml"]
  schedule:
    - cron: "30 11 * * *" # daily 11:30 UTC — after the blogger + deploy settle
  workflow_dispatch: {}

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Deploy worker
        working-directory: worker
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not configured yet — skipping deploy."
            exit 0
          fi
          npx wrangler@4 deploy

  reindex:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Re-embed the live corpus into Vectorize
        run: node worker/scripts/index-corpus.mjs
