<!-- @dsCard group="Type" viewport="700x240" name="Type scale" subtitle="Hero 60 → micro 10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
  .ts { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  .ts code { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); width: 150px; flex: none; }
  .ts span { color: var(--zinc-100); font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; }
</style>
</head>
<body>
<div class="ts"><code>--text-hero · 60px</code><span style="font-size:44px;">Systems</span></div>
<div class="ts"><code>--text-title · 30px</code><span style="font-size:30px;">streamerOS</span></div>
<div class="ts"><code>--text-card-title · 18px</code><span style="font-size:18px;">Recent post title</span></div>
<div class="ts"><code>--text-body · 14px</code><span style="font-size:14px;font-weight:400;color:var(--zinc-400);">Description body copy</span></div>
<div class="ts"><code>--text-caption · 12px</code><span style="font-size:12px;font-weight:400;color:var(--zinc-500);">EYEBROW / META</span></div>
<div class="ts"><code>--text-micro · 10px</code><span style="font-size:10px;font-weight:400;color:var(--zinc-500);">CATEGORY LABEL</span></div>
</body>
</html>
