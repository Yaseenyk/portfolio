<!-- @dsCard group="Colors" viewport="700x150" name="Terminal syntax tokens" subtitle="tok-* classes for code blocks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
  pre { margin: 14px 0 0; font-family: var(--font-mono); font-size: 13px; line-height: 1.7; color: var(--zinc-300); }
</style>
</head>
<body>
<div class="sw-row">
<div class="sw"><div class="chip" style="background:var(--tok-key);"></div><div class="lbl"><b>.tok-key</b>#22D3EE</div></div>
<div class="sw"><div class="chip" style="background:var(--tok-fn);"></div><div class="lbl"><b>.tok-fn</b>#A855F7</div></div>
<div class="sw"><div class="chip" style="background:var(--tok-str);"></div><div class="lbl"><b>.tok-str</b>#86EFAC</div></div>
<div class="sw"><div class="chip" style="background:var(--tok-num);"></div><div class="lbl"><b>.tok-num</b>#67E8F9</div></div>
<div class="sw"><div class="chip" style="background:var(--tok-com);"></div><div class="lbl"><b>.tok-com</b>#52525B</div></div>
<div class="sw"><div class="chip" style="background:var(--tok-punc);"></div><div class="lbl"><b>.tok-punc</b>#71717A</div></div>
</div>
<pre><span class="tok-com">// retrieval budget</span>  <span class="tok-key">const</span> <span class="tok-fn">retrieve</span><span class="tok-punc">(</span><span class="tok-str">"query"</span><span class="tok-punc">,</span> <span class="tok-num">8</span><span class="tok-punc">)</span></pre>
</body>
</html>
