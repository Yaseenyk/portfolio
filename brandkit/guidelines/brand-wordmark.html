<!-- @dsCard group="Brand" viewport="700x140" name="Wordmark" subtitle="No logomark — bold name + live PulseDot in a glass pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
</style>
</head>
<body>
<div style="display:flex;align-items:center;gap:24px;">
  <span style="display:inline-flex;align-items:center;gap:10px;border-radius:9999px;border:1px solid rgba(39,39,42,.5);background:rgba(9,9,11,.6);padding:12px 24px;box-shadow:var(--shadow-nav);">
    <span style="font-size:14px;font-weight:700;letter-spacing:-0.025em;color:var(--zinc-50);">Yaseen Khatib</span>
    <span class="sk-pulse-dot"></span>
  </span>
  <span style="font-family:var(--font-mono);font-size:10px;color:var(--zinc-500);max-width:30ch;">Inter 700 14px tracking-tight + ice signal dot. Favicon: assets/favicon.ico</span>
</div>
</body>
</html>
