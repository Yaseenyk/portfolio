<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Pill → card 16 → panel 12 → button 8 → note 6" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
  .r { display:flex; gap:12px; }
  .r > div { flex:1; height:72px; border:1px solid var(--zinc-700); background:rgba(255,255,255,0.02); display:flex; align-items:flex-end; padding:8px 10px; font-family:var(--font-mono); font-size:10px; color:var(--zinc-500); }
</style>
</head>
<body>
<div class="r">
<div style="border-radius:var(--radius-pill);align-items:center;justify-content:center;">pill · 9999</div>
<div style="border-radius:var(--radius-card);">card · 16</div>
<div style="border-radius:var(--radius-panel);">panel · 12</div>
<div style="border-radius:var(--radius-button);">button · 8</div>
<div style="border-radius:var(--radius-note);">note · 6</div>
</div>
</body>
</html>
