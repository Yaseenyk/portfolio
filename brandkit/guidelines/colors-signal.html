<!-- @dsCard group="Colors" viewport="700x130" name="Signal palette" subtitle="Ink base + the three signal colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
</style>
</head>
<body>
<div class="sw-row">
<div class="sw"><div class="chip" style="background:var(--ink);"></div><div class="lbl"><b>--ink · page</b>#05070A</div></div>
<div class="sw"><div class="chip" style="background:var(--cyan);"></div><div class="lbl"><b>--cyan · primary signal</b>#22D3EE</div></div>
<div class="sw"><div class="chip" style="background:var(--purple);"></div><div class="lbl"><b>--purple · gradient partner</b>#A855F7</div></div>
<div class="sw"><div class="chip" style="background:var(--ice);"></div><div class="lbl"><b>--ice · live accent</b>#67E8F9</div></div>
</div>
</body>
</html>
