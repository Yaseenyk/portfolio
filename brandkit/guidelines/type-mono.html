<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
</style>
</head>
<body>
<div style="display:grid;gap:14px;">
<span style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.25em;color:var(--cyan);">~/projects</span>
<span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:var(--cyan);">Flagship · Desktop Cockpit</span>
<span style="font-family:var(--font-mono);font-size:12px;color:var(--zinc-500);">portfolio -- interactive-mode</span>
<span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--zinc-600);">live · uptime 99.9%</span>
</div>
</body>
</html>
