<!-- @dsCard group="Colors" viewport="700x130" name="Semantic & status" subtitle="Emerald = ROI only; traffic lights = window chrome only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
</style>
</head>
<body>
<div class="sw-row">
<div class="sw"><div class="chip" style="background:var(--emerald);"></div><div class="lbl"><b>--emerald · ROI notes</b>#10B981</div></div>
<div class="sw"><div class="chip" style="background:var(--emerald-400);"></div><div class="lbl"><b>--emerald-400 · ROI text</b>#34D399</div></div>
<div class="sw"><div class="chip" style="background:var(--red-traffic);"></div><div class="lbl"><b>traffic red</b>#FF5F57</div></div>
<div class="sw"><div class="chip" style="background:var(--yellow-traffic);"></div><div class="lbl"><b>traffic yellow</b>#FEBC2E</div></div>
<div class="sw"><div class="chip" style="background:var(--green-traffic);"></div><div class="lbl"><b>traffic green</b>#28C840</div></div>
</div>
</body>
</html>
