<!-- @dsCard group="Brand" viewport="700x170" name="Motion" subtitle="cubic-bezier(.21,.47,.32,.98) · fade+rise reveals · ambient loops" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
  @keyframes demo-reveal { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
  .mo { display:flex; gap:12px; }
  .mo > div { flex:1; border-radius:12px; border:1px solid var(--zinc-800); background:var(--surface-card); padding:12px; font-family:var(--font-mono); font-size:10px; color:var(--zinc-500); line-height:1.6; }
</style>
</head>
<body>
<div class="mo">
  <div style="animation:demo-reveal .6s var(--ease-signal) both;"><b style="color:var(--zinc-200);font-weight:500;">Reveal</b><br />fade + rise 24px · 0.6s<br />stagger 0.08–0.12s</div>
  <div><b style="color:var(--zinc-200);font-weight:500;">Hover / press</b><br />scale 1.03 / 0.97<br />color + glow 200–300ms</div>
  <div style="display:flex;align-items:center;gap:10px;"><span class="sk-pulse-dot"></span><span><b style="color:var(--zinc-200);font-weight:500;">Ambient loops</b><br />ping 1.8s · gradient 4s</span></div>
  <div><b style="color:var(--zinc-200);font-weight:500;">Ease</b><br />cubic-bezier<br />(.21, .47, .32, .98)</div>
</div>
</body>
</html>
