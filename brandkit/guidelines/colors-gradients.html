<!-- @dsCard group="Colors" viewport="700x150" name="Gradients" subtitle="Signal gradient + ambient page glows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .sw-row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .sw .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(39,39,42,.6); }
  .sw .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--zinc-500); }
  .sw .lbl b { display: block; color: var(--zinc-300); font-weight: 500; }
</style>
</head>
<body>
<div class="sw-row">
<div class="sw"><div class="chip" style="background:var(--gradient-signal);background-size:200% auto;"></div><div class="lbl"><b>--gradient-signal</b>cyan → purple → cyan</div></div>
<div class="sw"><div class="chip" style="background-color:var(--ink);background-image:var(--gradient-ambient);background-position:50% 0;"></div><div class="lbl"><b>--gradient-ambient</b>radial cyan + purple washes over ink</div></div>
<div class="sw"><div class="chip" style="background:transparent;display:flex;flex-direction:column;justify-content:space-evenly;padding:0 8px;"><span style="height:1px;background:var(--gradient-rule)"></span><span style="height:1px;background:var(--gradient-rule-neutral)"></span></div><div class="lbl"><b>--gradient-rule / -neutral</b>1px fading dividers</div></div>
</div>
</body>
</html>
