<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Circuit Y — Variations</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="scraps/design-canvas.jsx"></script>
<script type="text/babel" src="scraps/logo-marks-v3.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { CyA, CyB, CyC, CyD, CyE, CyF, V3Strip, V3Lockup } = window;

const v3frame = {
  display: "grid",
  placeItems: "center",
  height: 220,
  background: "#05070A",
  backgroundImage: "radial-gradient(20rem 14rem at 50% -10%, rgba(34,211,238,0.10), transparent 60%)",
};

function Board({ Mark }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={v3frame}>
        <div style={{ filter: "drop-shadow(0 0 26px rgba(34,211,238,0.35))" }}>
          <Mark size={160} />
        </div>
      </div>
      <V3Strip Mark={Mark} />
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="cy-vars" title="Circuit Y — variations" subtitle="Six takes on the chosen mark · favicon sizes 48 / 32 / 16">
        <DCArtboard id="va" label="A · The pick (cyan→purple)" width={330} height={345}><Board Mark={CyA} /></DCArtboard>
        <DCArtboard id="vb" label="B · Pure signal (cyan→ice)" width={330} height={345}><Board Mark={CyB} /></DCArtboard>
        <DCArtboard id="vc" label="C · Inverted gradient tile" width={330} height={345}><Board Mark={CyC} /></DCArtboard>
        <DCArtboard id="vd" label="D · PCB routing" width={330} height={345}><Board Mark={CyD} /></DCArtboard>
        <DCArtboard id="ve" label="E · Live port (pulse dot)" width={330} height={345}><Board Mark={CyE} /></DCArtboard>
        <DCArtboard id="vf" label="F · Badge (round, no tile)" width={330} height={345}><Board Mark={CyF} /></DCArtboard>
      </DCSection>
      <DCSection id="cy-lockups" title="Lockups" subtitle="Mark + name + role line">
        <DCArtboard id="lva" label="A lockup" width={440} height={110}><V3Lockup Mark={CyA} /></DCArtboard>
        <DCArtboard id="lvb" label="B lockup" width={440} height={110}><V3Lockup Mark={CyB} /></DCArtboard>
        <DCArtboard id="lvc" label="C lockup" width={440} height={110}><V3Lockup Mark={CyC} /></DCArtboard>
        <DCArtboard id="lvd" label="D lockup" width={440} height={110}><V3Lockup Mark={CyD} /></DCArtboard>
        <DCArtboard id="lve" label="E lockup" width={440} height={110}><V3Lockup Mark={CyE} /></DCArtboard>
        <DCArtboard id="lvf" label="F lockup" width={440} height={110}><V3Lockup Mark={CyF} /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
